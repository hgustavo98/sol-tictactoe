[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
match_escrow = "AcNc9UMCBBzuN8Yb54gspKEZ5h6zT1pFZCd4L89mHx2h"

[programs.devnet]
match_escrow = "AcNc9UMCBBzuN8Yb54gspKEZ5h6zT1pFZCd4L89mHx2h"

[programs.mainnet-beta]
match_escrow = "AcNc9UMCBBzuN8Yb54gspKEZ5h6zT1pFZCd4L89mHx2h"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000

[test.validator]
url = "https://api.devnet.solana.com"
