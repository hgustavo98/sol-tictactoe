# Render Blueprint — SOL TTT API + WebSocket
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sol-ttt-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MOCK_ESCROW
        value: true
      - key: REQUIRE_PLAYER_AUTH
        value: false
      - key: LAUNCH_CLUSTER
        value: devnet
      - key: HOUSE_RAKE_BPS
        value: "300"
      - key: CORS_ORIGIN
        value: https://sol-ttt.vercel.app,https://sol-tictactoe.vercel.app,https://sol-ttt.xyz,https://www.sol-ttt.xyz
      - key: AUTHORITY_KEYPAIR_PATH
        value: /etc/secrets/authority.json
      - key: FEE_WALLET_KEYPAIR_PATH
        value: /etc/secrets/fee-wallet.json
      - key: ADMIN_PLATFORMS_CONFIG
        value: ./apps/server/admin-platforms.json
      # Set in Render dashboard (secrets):
      # RPC_URL, PROGRAM_ID, FEE_RECIPIENT_WALLET, MONGODB_URI,
      # ADMIN_GATE_EMAIL, ADMIN_GATE_GOOGLE_EMAIL, ADMIN_GATE_WALLET,
      # GOOGLE_CLIENT_ID, ADMIN_SECRET, ADMIN_API_KEY
      # Upload secret files: authority.json, fee-wallet.json
